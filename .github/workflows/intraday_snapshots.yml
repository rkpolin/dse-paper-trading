name: Intraday DSE Snapshots

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force run outside a target time bucket for manual testing"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    # Bangladesh time is UTC+6. Runs Sunday-Thursday at 10:05 through 13:50.
    - cron: "5,20,35,50 4-7 * * 0-4"
    # Final 14:05 Bangladesh-time snapshot.
    - cron: "5 8 * * 0-4"

jobs:
  intraday-snapshots:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: python_engine/requirements.txt

      - name: Install dependencies
        run: pip install -r python_engine/requirements.txt

      - name: Run tests
        run: pytest python_engine/tests

      - name: Run intraday snapshot collector
        env:
          DSE_LATEST_URL: https://www.dsebd.org/latest_share_price_scroll_l.php
          DSE_MARKET_STATUS_URL: https://www.dsebd.org/mst.txt
          INTRADAY_HISTORY_CSV_PATH: python_engine/sample_data/dse_intraday_demo.csv
          INTRADAY_BUCKET_TOLERANCE_MINUTES: "8"
          INTRADAY_FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
          INTRADAY_STAT_LOOKBACKS: "20,30,60"
          DSE_HOLIDAYS: ""
          HOSTINGER_API_BASE_URL: ${{ secrets.HOSTINGER_API_BASE_URL }}
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          HOSTINGER_HMAC_SECRET: ${{ secrets.HOSTINGER_HMAC_SECRET }}
          HOSTINGER_API_TIMEOUT_SECONDS: "180"
        run: python python_engine/run_intraday.py
